<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>自资费统计</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
                 "PingFang SC", "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: #1d1d1f;
    min-height: 100vh;
    padding: 40px 32px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: linear-gradient(180deg, #f5f5f7 0%, #ebebef 100%);
    background-attachment: fixed;
  }

  .shell {
    width: 760px;
    max-width: 100%;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-radius: 16px;
    border: 0.5px solid rgba(0,0,0,0.08);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 20px 40px -12px rgba(0,0,0,0.20),
      0 2px 6px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .titlebar {
    background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(245,245,247,0.6) 100%);
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    -webkit-app-region: drag;
    user-select: none;
  }
  .traffic-lights { display: flex; gap: 8px; -webkit-app-region: no-drag; }
  .traffic-lights span {
    width: 12px; height: 12px; border-radius: 50%;
    display: inline-block; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .traffic-lights .r { background: #ff5f57; }
  .traffic-lights .y { background: #febc2e; }
  .traffic-lights .g { background: #28c840; }
  .titlebar .title {
    font-size: 15px;
    font-weight: 600;
    color: #1d1d1f;
    letter-spacing: -0.01em;
  }
  .titlebar .subtitle {
    font-size: 12px;
    color: #86868b;
    margin-left: 6px;
  }

  .content {
    padding: 20px 24px 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .group {
    background: rgba(255,255,255,0.6);
    border: 0.5px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    padding: 14px 16px 16px;
  }
  .group-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .group-title {
    font-size: 12px;
    font-weight: 600;
    color: #86868b;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .group-body {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  label { font-size: 13px; color: #424245; }
  input[type="text"], input[type="number"] {
    font-family: inherit;
    padding: 7px 12px;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    background: rgba(255,255,255,0.8);
    color: #1d1d1f;
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.04);
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: rgba(0,122,255,0.6);
    box-shadow: 0 0 0 3px rgba(0,122,255,0.18), inset 0 0 0 0.5px rgba(0,0,0,0.06);
    background: #fff;
  }

  button {
    font-family: inherit;
    padding: 7px 16px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: filter .12s, transform .05s, background .15s;
    letter-spacing: -0.005em;
  }
  button:active { transform: translateY(0.5px); }
  button.primary {
    background: #007aff;
    color: #fff;
  }
  button.primary:hover { background: #0a84ff; }
  button.danger {
    background: rgba(255, 59, 48, 0.9);
    color: #fff;
  }
  button.danger:hover { background: rgba(255, 59, 48, 1); }
  button.default {
    background: rgba(0,0,0,0.04);
    color: #1d1d1f;
  }
  button.default:hover { background: rgba(0,0,0,0.08); }

  .cap-label {
    font-size: 12px;
    color: #ff3b30;
  }

  .sortbar {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .sortbar label { font-size: 12px; color: #86868b; margin-right: 2px; }
  .sortbar button {
    padding: 5px 12px;
    font-size: 12px;
    background: rgba(0,0,0,0.04);
    color: #424245;
    font-weight: 400;
  }
  .sortbar button.active {
    background: #007aff;
    color: #fff;
  }

  .tablewrap {
    border: 0.5px solid rgba(0,0,0,0.06);
    border-radius: 10px;
    background: #fff;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td {
    padding: 10px 16px;
    text-align: left;
    border-bottom: 0.5px solid rgba(0,0,0,0.05);
  }
  thead th {
    background: rgba(245,245,247,0.6);
    font-size: 12px;
    font-weight: 600;
    color: #86868b;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    padding: 9px 16px;
  }
  thead th.clickable { cursor: pointer; user-select: none; }
  thead th.clickable:hover { color: #0a84ff; }

  tbody td { color: #1d1d1f; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(0,122,255,0.04); }
  tbody tr.overcap td { background: rgba(255, 59, 48, 0.06) !important; color: #8b2a26; }
  tbody tr.overcap:hover td { background: rgba(255, 59, 48, 0.10) !important; }

  td.num { text-align: right; font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  td.center { text-align: center; }
  .empty { text-align: center; padding: 32px; color: #86868b; font-size: 13px; }

  .statusbar {
    font-size: 12px;
    color: #424245;
    padding: 2px 4px 0 4px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: baseline;
  }
  .statusbar strong { font-size: 13px; color: #1d1d1f; }
  .statusbar .cap { color: #ff3b30; }
  .statusbar .muted { color: #86868b; }

  .bottombar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding-top: 2px;
  }
  .bottombar button, .bottombar label {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
  }
  .bottombar label {
    background: rgba(0,0,0,0.04);
    color: #1d1d1f;
    cursor: pointer;
    font-weight: 500;
    user-select: none;
  }
  .bottombar label:hover { background: rgba(0,0,0,0.08); }

  .toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(29, 29, 31, 0.85);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.warn { background: rgba(255, 59, 48, 0.9); }
  .toast.ok { background: rgba(52, 199, 89, 0.9); }

  @media (max-width: 640px) {
    body { padding: 16px 10px; }
    .shell { border-radius: 14px; }
    .content { padding: 14px 14px 16px; gap: 12px; }
    .group { padding: 12px 12px 14px; }
    th, td { padding: 8px 10px; font-size: 13px; }
    input[type="text"], input[type="number"] { width: 110px; flex: 1; }
  }
</style>
</head>
<body>
<div class="shell">

  <div class="titlebar">
    <div class="traffic-lights"><span class="r"></span><span class="y"></span><span class="g"></span></div>
    <div class="title" id="titlebarText">自资费统计</div>
  </div>

  <div class="content">

    <div class="group">
      <div class="group-head">
        <div class="group-title">自费上限设置</div>
      </div>
      <div class="group-body">
        <label>每位序号累计自费上限 (元, 0 表示不限):</label>
        <input type="number" id="capInput" step="0.01" min="0">
        <button class="primary" onclick="saveCap()">保存上限</button>
        <span class="cap-label" id="capLabel"></span>
      </div>
    </div>

    <div class="group">
      <div class="group-head">
        <div class="group-title">录入自费</div>
      </div>
      <div class="group-body">
        <label>序号:</label>
        <input type="text" id="sidInput" autocomplete="off" style="width:150px;">
        <label>自费 (元):</label>
        <input type="number" id="amountInput" step="0.01" min="0" style="width:150px;">
        <button class="primary" onclick="addPayment()">提交缴费</button>
        <button class="danger" onclick="clearAll()">清空全部</button>
      </div>
    </div>

    <div class="group">
      <div class="group-head">
        <div class="group-title">缴费记录汇总</div>
      </div>

      <div class="sortbar">
        <span style="color:#86868b;font-size:12px;">排序</span>
        <button id="sortSid" onclick="setSort('sid')">序号 ▲</button>
        <button id="sortTotal" onclick="setSort('total')">累计自费 ▲</button>
        <button id="sortCount" onclick="setSort('count')">次数 ▲</button>
        <button class="default" onclick="toggleDir()" style="padding:5px 12px;">⬇ 降序</button>
      </div>

      <div class="tablewrap">
        <table id="mainTable">
          <thead>
            <tr>
              <th class="clickable" onclick="setSort('sid')">序号</th>
              <th class="clickable" onclick="setSort('total')" style="text-align:right;">累计自费 (元)</th>
              <th class="clickable" onclick="setSort('count')" style="text-align:center;">缴费次数</th>
              <th>历次金额 (元)</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="statusbar" id="statusbar" style="margin-top:10px;"></div>

      <div class="bottombar">
        <button class="default" onclick="exportData()">导出数据</button>
        <label>
          导入数据
          <input type="file" accept="application/json" style="display:none" onchange="importData(this)">
        </label>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LS_KEY = "tuition-tracker-data";

let state = {
  _students: {},
  _settings: { tuition_cap: 0, first_after_reset_time: null },
  sort_col: "sid",
  sort_reverse: false
};

function naturalKey(s) {
  return String(s).split(/(\d+)/).map(t => /^\d+$/.test(t) ? {n: +t, s: t} : {n: NaN, s: t.toLowerCase()});
}
function naturalCompare(a, b) {
  const ka = naturalKey(a), kb = naturalKey(b);
  const len = Math.max(ka.length, kb.length);
  for (let i = 0; i < len; i++) {
    const x = ka[i] || {n: NaN, s: ""}, y = kb[i] || {n: NaN, s: ""};
    let c;
    if (!isNaN(x.n) && !isNaN(y.n)) c = x.n - y.n;
    else c = x.s.localeCompare(y.s, "zh");
    if (c !== 0) return c;
  }
  return 0;
}

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (parsed && typeof parsed === "object") {
      state._students = parsed._students || parsed || {};
      state._settings = parsed._settings || { tuition_cap: 0, first_after_reset_time: null };
    }
  } catch (e) {}
}
function saveData() {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}

function fmtDate(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  } catch (e) { return String(iso); }
}

function updateTitle() {
  const t = fmtDate(state._settings.first_after_reset_time);
  document.title = t ? `自资费统计  (首次记录: ${t})` : "自资费统计";
  const subtitle = t ? `· 首次记录 ${t}` : "";
  document.getElementById("titlebarText").innerHTML = `自资费统计 <span class="subtitle">${subtitle}</span>`;
}

function saveCap() {
  const v = parseFloat(document.getElementById("capInput").value);
  const cap = isNaN(v) ? 0 : v < 0 ? 0 : v;
  state._settings.tuition_cap = +cap.toFixed(2);
  document.getElementById("capInput").value = state._settings.tuition_cap;
  saveData();
  updateCapLabel();
  toast(`上限已保存: ${state._settings.tuition_cap.toFixed(2)} 元`, "ok");
  refreshTable();
}

function updateCapLabel() {
  const cap = state._settings.tuition_cap;
  document.getElementById("capLabel").textContent = cap && cap > 0 ? `当前上限: ${cap.toFixed(2)} 元` : "当前: 不限制";
}

function addPayment() {
  const sid = document.getElementById("sidInput").value.trim();
  const amtStr = document.getElementById("amountInput").value.trim();
  if (!sid) return toast("请输入序号", "warn");
  if (!amtStr) return toast("请输入自费", "warn");
  const amt = parseFloat(amtStr);
  if (isNaN(amt)) return toast("自费必须是数字", "warn");
  if (amt < 0) return toast("自费不能为负数", "warn");

  const now = new Date();
  const iso = now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,"0") + "-" +
    String(now.getDate()).padStart(2,"0") + "T" +
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0") + ":" +
    String(now.getSeconds()).padStart(2,"0");

  if (!state._students[sid]) state._students[sid] = { total: 0, count: 0, history: [] };
  const rec = state._students[sid];
  const newTotal = +(rec.total + amt).toFixed(2);

  const cap = state._settings.tuition_cap;
  if (cap && cap > 0 && newTotal > cap) {
    if (!confirm(`序号 ${sid} 本次缴费后累计将为 ${newTotal.toFixed(2)} 元，已超过上限 ${cap.toFixed(2)} 元！\n\n是否仍要提交？`))
      return;
  }

  rec.total = newTotal;
  rec.count += 1;
  rec.history.push(+amt.toFixed(2));

  if (!state._settings.first_after_reset_time) state._settings.first_after_reset_time = iso;

  saveData();
  refreshTable();
  document.getElementById("sidInput").value = "";
  document.getElementById("amountInput").value = "";
  document.getElementById("sidInput").focus();
  toast("已提交", "ok");
}

function clearAll() {
  if (Object.keys(state._students).length === 0) return;
  if (!confirm("确定要清空全部记录吗？此操作不可撤销。")) return;
  state._students = {};
  state._settings.first_after_reset_time = null;
  saveData();
  refreshTable();
  toast("已清空", "ok");
}

function setSort(col) {
  if (state.sort_col === col) state.sort_reverse = !state.sort_reverse;
  else { state.sort_col = col; state.sort_reverse = false; }
  refreshTable();
}
function toggleDir() { state.sort_reverse = !state.sort_reverse; refreshTable(); }

function refreshTable() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  const cap = state._settings.tuition_cap;
  const sids = Object.keys(state._students);

  let sorted;
  if (state.sort_col === "sid") sorted = [...sids].sort((a, b) => naturalCompare(a, b));
  else if (state.sort_col === "total") sorted = [...sids].sort((a, b) => state._students[a].total - state._students[b].total);
  else if (state.sort_col === "count") sorted = [...sids].sort((a, b) => state._students[a].count - state._students[b].count);
  if (state.sort_reverse) sorted.reverse();

  let grand = 0;
  sorted.forEach(sid => {
    const r = state._students[sid];
    grand += r.total;
    const over = cap && cap > 0 && r.total > cap;
    const tr = document.createElement("tr");
    if (over) tr.className = "overcap";
    tr.innerHTML =
      `<td>${escapeHtml(sid)}</td>` +
      `<td class="num">${r.total.toFixed(2)}</td>` +
      `<td class="center">${r.count}</td>` +
      `<td>${r.history.map(v => v.toFixed(2)).join(" + ")}</td>`;
    tbody.appendChild(tr);
  });

  if (sorted.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty">暂无记录，请在上方录入</td></tr>`;
  }

  const colLabel = state.sort_col === "sid" ? "序号" : state.sort_col === "total" ? "累计自费" : "次数";
  const order = state.sort_reverse ? "降序" : "升序";
  const capTxt = cap && cap > 0 ? `  <span class="cap">(上限 ${cap.toFixed(2)} 元)</span>` : "";
  document.getElementById("statusbar").innerHTML =
    `<strong>序号数: ${sorted.length} · 全部累计自费总额: ${grand.toFixed(2)} 元</strong>${capTxt} <span class="muted">· 排序: ${colLabel} (${order})</span>`;

  function arrow(c) {
    if (state.sort_col !== c) return " ▲";
    return state.sort_reverse ? " ▼" : " ▲";
  }
  document.getElementById("sortSid").textContent = "序号" + arrow("sid");
  document.getElementById("sortTotal").textContent = "累计自费" + arrow("total");
  document.getElementById("sortCount").textContent = "次数" + arrow("count");

  document.getElementById("sortSid").className = (state.sort_col === "sid" ? "sortbar button active" : "sortbar button");
  document.getElementById("sortTotal").className = (state.sort_col === "total" ? "sortbar button active" : "sortbar button");
  document.getElementById("sortCount").className = (state.sort_col === "count" ? "sortbar button active" : "sortbar button");

  const ths = document.querySelectorAll("thead th");
  ths[0].textContent = "序号" + arrow("sid");
  ths[1].textContent = "累计自费 (元)" + arrow("total");
  ths[2].textContent = "缴费次数" + arrow("count");

  updateTitle();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function exportData() {
  const blob = new Blob([JSON.stringify({ _students: state._students, _settings: state._settings }, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const now = new Date();
  const stamp = now.getFullYear() + String(now.getMonth()+1).padStart(2,"0") + String(now.getDate()).padStart(2,"0") + "_" + String(now.getHours()).padStart(2,"0") + String(now.getMinutes()).padStart(2,"0");
  a.download = `tuition_data_${stamp}.json`;
  a.click();
  toast("已导出", "ok");
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || typeof data !== "object") throw new Error("invalid");
      if (!confirm("确定要导入此数据吗？当前浏览器中的数据会被替换。")) return;
      state._students = data._students || data || {};
      state._settings = data._settings || state._settings;
      saveData();
      refreshTable();
      toast("导入成功", "ok");
    } catch (err) { toast("导入失败: 文件格式错误", "warn"); }
  };
  reader.readAsText(file);
  input.value = "";
}

let toastTimer = null;
function toast(msg, cls) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show " + (cls || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = "toast"; }, 2400);
}

loadData();
const initCap = parseFloat(state._settings.tuition_cap);
document.getElementById("capInput").value = isNaN(initCap) ? 0 : initCap;
updateCapLabel();
refreshTable();

document.getElementById("sidInput").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("amountInput").focus();
});
document.getElementById("amountInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addPayment();
});
document.getElementById("capInput").addEventListener("keydown", e => {
  if (e.key === "Enter") saveCap();
});
document.getElementById("sidInput").focus();
</script>
</body>
</html>
