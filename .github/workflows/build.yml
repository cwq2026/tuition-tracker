name: Build Tuition Tracker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            ext: .exe
            args: --windowed
            archive: tgz
          - name: macOS
            os: macos-14
            ext: ""
            args: --windowed --target-arch universal2
            archive: tgz
          - name: macOS-Legacy
            os: macos-15-intel
            ext: ""
            args: --windowed
            archive: tgz
          - name: Linux
            os: ubuntu-latest
            ext: ""
            args: --windowed
            archive: tgz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build
        shell: bash
        run: |
          rm -rf dist build
          pyinstaller --noconfirm --clean --onefile \
            --name "TuitionTracker" \
            ${{ matrix.args }} \
            tuition_tracker.py

      - name: Package artifact
        shell: bash
        run: |
          cd dist
          NAME="TuitionTracker_${{ matrix.name }}"
          if [ -d "TuitionTracker.app" ]; then
            mv TuitionTracker.app "${NAME}.app"
            # 设置可执行权限
            chmod +x "${NAME}.app/Contents/MacOS/TuitionTracker"
            # 清除隔离属性（避免Gatekeeper警告）
            xattr -cr "${NAME}.app" 2>/dev/null || true
            if [ "${{ matrix.archive }}" = "tgz" ]; then
              tar -czf "${NAME}.app.tar.gz" "${NAME}.app"
            else
              zip -r "${NAME}.app.zip" "${NAME}.app"
            fi
          elif [ -f "TuitionTracker${{ matrix.ext }}" ]; then
            mv "TuitionTracker${{ matrix.ext }}" "${NAME}${{ matrix.ext }}"
            chmod +x "${NAME}${{ matrix.ext }}" 2>/dev/null || true
            if [ "${{ matrix.archive }}" = "tgz" ]; then
              tar -czf "${NAME}${{ matrix.ext }}.tar.gz" "${NAME}${{ matrix.ext }}"
            else
              zip "${NAME}${{ matrix.ext }}.zip" "${NAME}${{ matrix.ext }}"
            fi
          else
            mv TuitionTracker "${NAME}"
            chmod +x "${NAME}" 2>/dev/null || true
            if [ "${{ matrix.archive }}" = "tgz" ]; then
              tar -czf "${NAME}.tar.gz" "${NAME}"
            else
              zip "${NAME}.zip" "${NAME}"
            fi
          fi
          # 只保留压缩包，删除原始文件
          rm -rf "${NAME}.app" "${NAME}${{ matrix.ext }}" "${NAME}" 2>/dev/null || true
          # 打印最终的文件列表
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TuitionTracker-${{ matrix.name }}
          path: dist/*
          if-no-files-found: ignore
          compression-level: 0
