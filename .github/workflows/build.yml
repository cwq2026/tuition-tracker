name: Build Tuition Tracker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        shell: pwsh
        run: |
          choco install ImageMagick --no-progress -y

      - name: Generate icon.ico
        shell: pwsh
        run: |
          convert assets/icon.svg -define icon:auto-resize=16,32,48,64,128,256 assets/icon.ico

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip; pip install pyinstaller

      - name: Build .exe
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed `
            --name TuitionTracker `
            --icon assets/icon.ico `
            tuition_tracker.py

      - name: Bundle for noobs
        shell: pwsh
        run: |
          cd dist
          Copy-Item ../docs/index.html index.html
          @'
TuitionTracker 使用说明（Windows）
================================

1. 双击 TuitionTracker.exe 就能打开。
2. 提示“Windows Defender 已阻止未知来源”？
     → 点击「更多信息」→「仍要运行」。
3. 数据会自动保存在同目录下的 tuition_data.json，
   把 .exe 和 .json 放一起备份即可。
4. 如果杀毒软件提示，这是误报（程序很小且开源），
   选择「允许 / 保留」即可。

浏览器版（打不开 .exe 时用）
================================
双击 index.html，用 Edge / Chrome 打开即可。
数据保存在浏览器里（localStorage）。
'@ | Out-File -Encoding utf8 使用说明.txt
          tar -czf TuitionTracker_Windows.zip TuitionTracker.exe index.html 使用说明.txt

      - uses: actions/upload-artifact@v4
        with:
          name: TuitionTracker-Windows
          path: dist/TuitionTracker_Windows.zip
          compression-level: 0

  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          brew install imagemagick create-dmg || true

      - name: Generate icon.png + .icns
        run: |
          cd assets
          convert icon.svg -resize 1024x1024 icon.png
          rm -rf icon.iconset && mkdir icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png      2>/dev/null || convert icon.png -resize 16x16 icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png    2>/dev/null || convert icon.png -resize 32x32 icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png      2>/dev/null || convert icon.png -resize 32x32 icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png  2>/dev/null || convert icon.png -resize 64x64 icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_64x64.png      2>/dev/null || convert icon.png -resize 128x128 icon.iconset/icon_64x64.png
          sips -z 256 256   icon.png --out icon.iconset/icon_64x64@2x.png   2>/dev/null || convert icon.png -resize 256x256 icon.iconset/icon_64x64@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128.png    2>/dev/null || convert icon.png -resize 256x256 icon.iconset/icon_128x128.png
          sips -z 512 512   icon.png --out icon.iconset/icon_128x128@2x.png 2>/dev/null || convert icon.png -resize 512x512 icon.iconset/icon_128x128@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256.png    2>/dev/null || convert icon.png -resize 512x512 icon.iconset/icon_256x256.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_256x256@2x.png 2>/dev/null || convert icon.png -resize 1024x1024 icon.iconset/icon_256x256@2x.png
          iconutil -c icns icon.iconset -o icon.icns 2>/dev/null || true
          ls icon.iconset | head

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip; pip install pyinstaller

      - name: Build .app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onefile \
            --name TuitionTracker \
            --icon assets/icon.icns \
            --osx-bundle-identifier com.local.tuitiontracker \
            tuition_tracker.py || \
          python -m PyInstaller --noconfirm --clean --windowed --onefile \
            --name TuitionTracker \
            --icon assets/icon.icns \
            tuition_tracker.py
          if [ -f assets/icon.icns ] && [ -d dist/TuitionTracker.app ]; then
            cp assets/icon.icns dist/TuitionTracker.app/Contents/Resources/app.icns 2>/dev/null || true
          fi
          rm -f dist/TuitionTracker 2>/dev/null || true
          xattr -cr dist/TuitionTracker.app 2>/dev/null || true

      - name: Create DMG
        run: |
          cd dist
          cp ../docs/index.html .
          cat > 使用说明.txt <<'EOF'
TuitionTracker 使用说明（Mac）
=============================

第 1 步：双击 TuitionTracker.dmg，把 TuitionTracker 图标拖进「应用程序」。

第 2 步（非常重要，只做一次）：
   打开「应用程序」，找到 TuitionTracker，不要直接双击打开！
   用鼠标（右键）点一下 TuitionTracker → 选「打开」→ 再点一次「打开」确认。
   以后就可以正常双击打开了。

第 3 步：如果出现提示“来自身份不明的开发者”，
   就照上面第 2 步做（右键 → 打开）。

浏览器版（零门槛）
==================
双击 index.html，用 Safari / Chrome 打开即可。
数据保存在浏览器里。
EOF

          create-dmg \
            --volname "TuitionTracker" \
            --window-size 520 340 \
            --icon-size 120 \
            --icon "TuitionTracker.app" 140 160 \
            --app-drop-link 380 160 \
            --background "https://raw.githubusercontent.com/" \
            TuitionTracker.dmg TuitionTracker.app 2>/dev/null || \
          hdiutil create -volname TuitionTracker -srcfolder TuitionTracker.app -ov -format UDZO TuitionTracker.dmg
          tar -czf TuitionTracker_Mac.tar.gz TuitionTracker.dmg 使用说明.txt index.html

      - uses: actions/upload-artifact@v4
        with:
          name: TuitionTracker-macOS
          path: dist/TuitionTracker_Mac.tar.gz
          compression-level: 0
